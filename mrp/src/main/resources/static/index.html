<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>MRP System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #app { height: 100%; }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #1a56db, #1e429f);
        color: white;
      }
      .loading-screen h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      .loading-screen p {
        font-size: 1.1rem;
        opacity: 0.9;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1.5rem;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-screen">
        <div class="spinner"></div>
        <h1>MRP System</h1>
        <p>Loading application...</p>
      </div>
    </div>
    <script>
      console.log('MRP System - Initializing...');
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        document.getElementById('app').innerHTML = `
          <div style="padding: 40px; text-align: center; font-family: Arial, sans-serif;">
            <h1 style="color: #dc2626;">Application Error</h1>
            <p>Failed to load the application.</p>
            <pre style="background: #f3f4f6; padding: 20px; border-radius: 8px; text-align: left; overflow-x: auto; margin: 20px 0;">${e.error ? e.error.message : 'Unknown error'}</pre>
            <p>Please check the browser console for more details.</p>
          </div>
        `;
      });
    </script>
    <script type="module" src="/assets/index.js"></script>
    <link rel="stylesheet" href="/assets/index.css">
  </body>
</html>
